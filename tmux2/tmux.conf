# ============================================================
# tmux configuration (Dracula theme)
# ============================================================

# --- Terminal ---
set -g default-shell      /home/linuxbrew/.linuxbrew/bin/fish
set -g default-terminal   "xterm-kitty"
set -s default-terminal   "xterm-kitty"
set -as terminal-overrides ",xterm-kitty:RGB"
set -g  update-environment "KITTY_WINDOW_ID"

# --- Prefix & keys ---
set -g prefix C-q
bind C-q send-prefix
unbind C-b
set -g repeat-time 0
set -g mode-keys   vi
set -g status-keys emacs          # command prompt (prefix + :) — emacs keys are more natural
bind R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind C-p previous-window
bind C-n next-window

# --- General ---
set -s escape-time        0       # no ESC delay (important for nvim)
set -g history-limit      50000
set -g display-time       4000
set -g status-interval    5
set -g focus-events       on
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index         1
setw -g pane-base-index   1
set -g renumber-windows   on

# --- UI ---
set -g mouse          on
set -g set-clipboard  on
set -g status-position top

# --- Monitoring ---
setw -g monitor-activity on
setw -g monitor-silence  30
set  -g visual-activity  off      # off = highlight only, no status-line message
set  -g visual-silence   off
set  -g visual-bell      off
set  -g bell-action      any

# --- Dracula theme options (must precede @plugin dracula/tmux) ---
set -g @dracula-plugins         ""    # disable all dracula widgets
set -g @dracula-show-weather    false
set -g @dracula-show-left-icon  session
set -g @dracula-show-flags      true  # !, ~, #, *, -, Z next to window index
set -g @dracula-border-contrast true

# --- Plugins (managed by TPM) ---
# Install: prefix + I    Update: prefix + U    Clean: prefix + alt + u
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'       # deps: brew install reattach-to-user-namespace / apt install xsel
set -g @plugin 'tmux-plugins/tmux-logging'    # deps: brew install ansifilter
set -g @plugin 'dracula/tmux'

# --- TPM (keep at the very bottom) ---
run -b '~/.tmux/plugins/tpm/tpm'
