# ================================
# tmux legacy config (old tmux)
# ================================
# Use this on machines whose tmux is too old for tmux3/tmux.conf's
# format conditionals and unified style options (pre-1.9). Deliberately
# plugin-free: no TPM, no resurrect, no logging.

# Prefix: C-q (after mapping CapsLock -> Ctrl)
set -g prefix C-q
bind C-q send-prefix
bind R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind C-p previous-window
bind C-n next-window

# Basics
set -s escape-time      0
set -g repeat-time      0
set -g mode-keys        vi
set -g status-keys      emacs
set -g base-index       1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit    50000
set -g status-position  top
set -g set-clipboard    on
setw -g aggressive-resize on

# True color (tmux >= 2.2 with terminal-overrides; tmux >= 3.2 has
# terminal-features which is preferred but not available here).
set -g default-terminal    "screen-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"

# Dracula bar (split options for pre-1.9 compatibility)
# palette: white=#f8f8f2 gray=#44475a dark=#282a36 green=#50fa7b
set -g status-bg                      "#44475a"
set -g status-fg                      "#f8f8f2"
set -g message-bg                     "#44475a"
set -g message-fg                     "#f8f8f2"
set -g pane-border-fg                 "#44475a"
set -g pane-active-border-fg          "#50fa7b"
set -g window-status-bg               "#44475a"
set -g window-status-fg               "#f8f8f2"
set -g window-status-current-bg       "#50fa7b"
set -g window-status-current-fg       "#282a36"
set -g window-status-current-attr     "bold"

# Left: session name. Right: empty.
set -g status-left-length 40
set -g status-left  " #S  "
set -g status-right ""

# Window tabs: just #I #W, no state coloring (needs format conditionals).
set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "
