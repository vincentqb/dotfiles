# ============================================================
# tmux 3 native config — Dracula palette, no theme plugin, no TPM
# ============================================================

# --- Terminal ---
set -g default-shell      /home/linuxbrew/.linuxbrew/bin/fish
set -s default-terminal   "xterm-kitty"
set -as terminal-overrides ",xterm-kitty:RGB"
set -g  update-environment "KITTY_WINDOW_ID"

# --- Prefix & keys ---
set -g prefix C-q
bind C-q send-prefix
unbind C-b
set -g repeat-time 0
set -g mode-keys   vi
set -g status-keys emacs
bind R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind C-p previous-window
bind C-n next-window

# --- General ---
set -s escape-time        0
set -g history-limit      50000
set -g display-time       4000
set -g status-interval    5
set -g focus-events       on
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index         1
setw -g pane-base-index   1
set -g renumber-windows   on

# --- UI ---
set -g mouse          on
set -g set-clipboard   on
set -g status-position top

# --- Monitoring ---
setw -g monitor-activity on
setw -g monitor-silence  30
set  -g visual-activity  off
set  -g visual-silence   off
set  -g visual-bell      off
set  -g bell-action      any

# ============================================================
# Theme (Dracula palette for chrome, named colors for semantic state)
# palette: https://draculatheme.com/contribute
# ============================================================
# Dracula palette (only used where theme-specific mid-tones matter):
#   white=#f8f8f2 gray=#44475a dark_gray=#282a36 dark_purple=#6272a4
#   light_purple=#bd93f9 green=#50fa7b yellow=#f1fa8c
#
# Everything else uses base-16 named colors so it follows the terminal
# (kitty Dracula theme), which makes the config portable to other
# palettes too.

set -g status-style              "bg=#44475a,fg=#f8f8f2"
set -g message-style             "bg=#44475a,fg=#f8f8f2"
set -g pane-border-style         "fg=#44475a"
set -g pane-active-border-style  "fg=#bd93f9"

# Inactive-tab state styles are defined inline in window-status-format
# below (format conditionals, so bg= always takes effect).

# Left: session name; yellow when prefix is pressed
set -g status-left-length 40
set -g status-left "#[bg=#50fa7b,fg=#282a36,bold]#{?client_prefix,#[bg=#f1fa8c],} #S #[default] "

# Right: empty (we're in ssh; no battery/network/weather widgets)
set -g status-right-length 40
set -g status-right ""

# Window tabs: state expressed as background color via format conditionals.
# Precedence: bell > activity > silence > normal. Using format conditionals
# (rather than window-status-*-style) because explicit bg= in the format
# otherwise wins over the style system. tmux requires commas inside
# #{?cond,then,else} to be escaped as #, — hence the cluttered syntax.
#   bell      -> red bg    (attention, shouldn't happen often)
#   activity  -> yellow bg (something printed)
#   silence   -> blue bg   (idle >=30s; "waiting on me")
#   normal    -> dracula gray bg
# Tab ends with 'Z ' (zoomed) or '  ' to keep widths stable.
setw -g window-status-format \
  "#{?window_bell_flag,#[bg=red#,fg=black#,bold],#{?window_activity_flag,#[bg=yellow#,fg=black#,bold],#{?window_silence_flag,#[bg=blue#,fg=black#,bold],#[bg=#44475a#,fg=#f8f8f2]}}} #I #W #{?window_zoomed_flag,Z ,  }"
setw -g window-status-current-format \
  "#[fg=#f8f8f2,bg=#6272a4,bold] #I #W #{?window_zoomed_flag,Z ,  }"
setw -g window-status-separator ""

# ============================================================
# Plugins (loaded directly; no TPM)
# ============================================================
# Submodules live under ~/.tmux/plugins/<name>. Resurrect needs its .tmux
# file sourced; logging exposes bindings via its .tmux file.
run -b '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
run -b '~/.tmux/plugins/tmux-logging/logging.tmux'
