# ============================================================
# tmux 3 native config — Dracula palette, no theme plugin, no TPM
# ============================================================

# --- Terminal ---
set -g default-shell      /home/linuxbrew/.linuxbrew/bin/fish
set -s default-terminal   "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
# Let programs inside panes forward escape sequences to the outer
# terminal (OSC 52 clipboard, kitty graphics via unicode placeholders,
# shell-integration OSC 133 markers). Off by default since tmux 3.3.
set -g  allow-passthrough on
# Explicitly set update-environment to the tmux default list plus
# KITTY_WINDOW_ID. Using `set -g` (not `-ga`) so reloads are idempotent
# regardless of the running server's current value.
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY KITTY_WINDOW_ID"

# --- Prefix & keys ---
set -g prefix C-q
bind C-q send-prefix
# (no need to 'unbind C-b' — setting prefix already rebinds it.)
set -g repeat-time 0
set -g mode-keys   vi
set -g status-keys emacs
bind R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind C-p previous-window
bind C-n next-window

# --- General ---
set -s escape-time        0
set -g history-limit      50000
set -g display-time       4000
set -g status-interval    5
set -g focus-events       on
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index         1
setw -g pane-base-index   1
set -g renumber-windows   on

# --- UI ---
set -g mouse          on
# OSC 52 clipboard passthrough; requires outer terminal support (kitty ok).
set -g set-clipboard  on
set -g status-position top

# --- Monitoring ---
setw -g monitor-activity on
setw -g monitor-silence  30
set  -g visual-activity  off
set  -g visual-silence   off
set  -g visual-bell      off
# 'other' = notify on bell in non-current windows only; 'any' also pings
# the current window for every background bell, which is noisy.
set  -g bell-action      other

# ============================================================
# Theme (Dracula palette, hex throughout for consistency)
# palette: https://draculatheme.com/contribute
# ============================================================
# white        = #f8f8f2    red          = #ff5555
# gray         = #44475a    orange       = #ffb86c
# dark_gray    = #282a36    yellow       = #f1fa8c
# dark_purple  = #6272a4    green        = #50fa7b
# light_purple = #bd93f9    cyan         = #8be9fd
# pink         = #ff79c6    purple       = #b166cc

set -g status-style              "bg=#44475a,fg=#f8f8f2"
set -g message-style             "bg=#44475a,fg=#f8f8f2"
set -g pane-border-style         "fg=#44475a"
set -g pane-active-border-style  "fg=#50fa7b"

# Inactive-tab state styles are defined inline in window-status-format
# below (format conditionals, so bg= always takes effect).

# Left: session name pill (muted; matches status bar).
# Lights up yellow while the prefix key is held (client_prefix=1), so
# you get visual confirmation that the next keystroke is a tmux command.
# Padding is one space on each side of #S; #[default] resets to status-style.
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[bg=#f1fa8c#,fg=#282a36#,bold],#[bg=#44475a#,fg=#f8f8f2#,bold]} #S #[default] "

# Right: empty (we're in ssh; no battery/network/weather widgets)
set -g status-right-length 40
set -g status-right ""

# Window tabs: state expressed as background color via format conditionals.
# Precedence: bell > (activity AND silence) > activity > normal. tmux
# requires commas inside #{?cond,then,else} to be escaped as #, — hence
# the clutter.
#   bell                  -> red     #ff5555  (attention, rare)
#   activity + silence    -> yellow  #f1fa8c  (output after I left, now
#                                              quiet >=30s: "done, come back")
#   activity only         -> purple  #bd93f9  (something printed, still going)
#   normal                -> gray    #44475a  (untouched since last view)
# Note: bare window_silence_flag (silence without prior activity) is
# ignored — we don't want quiet, never-touched tabs to light up.
# Tab ends with 'Z ' (zoomed) or '  ' to keep widths stable.
#
# The format is a single string; backslash-newlines inside the quotes
# are line continuations, which tmux collapses before parsing.
setw -g window-status-format "\
#{?window_bell_flag,\
#[bg=#ff5555#,fg=#282a36#,bold],\
#{?window_activity_flag,\
#{?window_silence_flag,\
#[bg=#f1fa8c#,fg=#282a36#,bold],\
#[bg=#bd93f9#,fg=#282a36#,bold]\
},\
#[bg=#44475a#,fg=#f8f8f2]\
}\
} #I #W #{?window_zoomed_flag,Z ,  }"
setw -g window-status-current-format \
  "#[fg=#282a36,bg=#50fa7b,bold] #I #W #{?window_zoomed_flag,Z ,  }"
setw -g window-status-separator ""

# ============================================================
# Plugins (managed by TPM)
# ============================================================
# TPM auto-installs itself on first launch. Plugins live under
# ~/.tmux/plugins/<name>. Update via: prefix + U. Clean via: prefix + alt + u.
# Install new plugins via: prefix + I.

# Bootstrap TPM on first launch.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
         ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'

# tmux-resurrect: save/restore sessions across tmux server restarts.
# Defaults only save layout + cwd; opt into pane contents and nvim sessions.
#   @resurrect-capture-pane-contents 'on'
#     Save scrollback/visible text so panes come back with context.
#   @resurrect-strategy-nvim 'session'
#     For `nvim` processes, restore via Session.vim (requires you to
#     :mksession in that buffer, or use a plugin like vim-obsession).
#   @resurrect-processes
#     Restore common long-runners. ssh/mosh have special handling.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh mosh-client "~nvim" "~vim" "~less" "~man" "~tail" "~watch"'

# tmux-logging: toggle per-pane logging, save history, save visible screen.
set -g @plugin 'tmux-plugins/tmux-logging'

# Initialize TPM — keep this line at the very bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
