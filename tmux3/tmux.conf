set -s default-terminal   "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -g  allow-passthrough on
set -g  update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY KITTY_WINDOW_ID"

# Default shell: fish if installed, else tmux inherits $SHELL.
if-shell 'command -v fish >/dev/null' \
  'run-shell "tmux set-option -g default-shell $(command -v fish)"'

set -g prefix C-q
bind C-q send-prefix
set -g repeat-time 0
set -g mode-keys   vi
set -g status-keys emacs
bind R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind C-p previous-window
bind C-n next-window

set -s escape-time        0
set -g history-limit      50000
set -g display-time       4000
set -g status-interval    5
set -g focus-events       on
setw -g aggressive-resize on

set -g base-index         1
setw -g pane-base-index   1
set -g renumber-windows   on

set -g mouse          on
set -g set-clipboard  on
set -g status-position top

setw -g monitor-activity on
setw -g monitor-silence  30
set  -g visual-activity  off
set  -g visual-silence   off
set  -g visual-bell      off
set  -g bell-action      other

# Dracula palette
# white #f8f8f2  gray #44475a  dark #282a36  yellow #f1fa8c
# green #50fa7b  red  #ff5555  purple #bd93f9
set -g status-style                  "bg=#44475a,fg=#f8f8f2"
set -g message-style                 "bg=#44475a,fg=#f8f8f2"
set -g pane-border-style             "fg=#44475a"
set -g pane-active-border-style      "fg=#50fa7b"
# Disable tmux's built-in 'reverse' overlay so format colors win.
set -g window-status-activity-style  default
set -g window-status-bell-style      default

# Left: session pill flashes yellow while prefix is held.
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[bg=#f1fa8c#,fg=#282a36#,bold],#[bg=#44475a#,fg=#f8f8f2#,bold]} #S #[default] "
set -g status-right-length 40
set -g status-right ""

# Tabs: bell=red > activity+silence=yellow > activity=purple > gray.
# Current is bold on Dracula pink. Commas in #{?...} escape as #, .
setw -g window-status-format "\
#{?window_bell_flag,\
#[bg=#ff5555#,fg=#282a36],\
#{?window_activity_flag,\
#{?window_silence_flag,\
#[bg=#f1fa8c#,fg=#282a36],\
#[bg=#bd93f9#,fg=#282a36]\
},\
#[bg=#44475a#,fg=#f8f8f2]\
}\
}  #I #W #{?window_zoomed_flag,Z ,  }"
setw -g window-status-current-format \
  "#[fg=#282a36,bg=#ff79c6,bold]  #I #W #{?window_zoomed_flag,Z ,  }"
setw -g window-status-separator ""

# Plugins (TPM auto-installs on first launch)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
         ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh mosh-client "~nvim" "~vim" "~less" "~man" "~tail" "~watch"'

set -g @plugin 'tmux-plugins/tmux-logging'

run '~/.tmux/plugins/tpm/tpm'
